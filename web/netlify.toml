  status = 200

[[redirects]]
  from = "/api/stripe/portal"
  to = "/.netlify/functions/stripe-portal"
  status = 200

[[redirects]]
  from = "/api/stripe/webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# --- Admin ---

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/newsletter"
  to = "/.netlify/functions/admin-newsletter"
  status = 200

# --- Email ---

[[redirects]]
  from = "/api/email/subscribe"
  to = "/.netlify/functions/email-subscribe"
  status = 200

[[redirects]]
  from = "/api/email/confirm"
  to = "/.netlify/functions/email-confirm"
  status = 200

[[redirects]]
  from = "/api/email/unsubscribe"
  to = "/.netlify/functions/email-unsubscribe"
  status = 200

[[redirects]]
  from = "/api/email/alerts/unsubscribe"
  to = "/.netlify/functions/signal-alert-unsubscribe"
  status = 200

[[redirects]]
  from = "/api/pro/alerts/preferences"
  to = "/.netlify/functions/signal-alert-preferences"
  status = 200

[[redirects]]
  from = "/api/email/digest"
  to = "/.netlify/functions/weekly-digest"
  status = 200

# --- SPA catch-all (MUST be last) ---

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
