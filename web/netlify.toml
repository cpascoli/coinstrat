[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Security headers (HSTS)
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# --- Data proxy routes ---

# Proxy for FRED API to handle CORS and hide API key
[[redirects]]
  from = "/api/fred/*"
  to = "/.netlify/functions/fred/:splat"
  status = 200

# Proxy for BGeometrics on-chain data (LTH SOPR, NUPL, SIP)
[[redirects]]
  from = "/api/bgeometrics/*"
  to = "/.netlify/functions/bgeometrics/:splat"
  status = 200

# --- Signal API v1 ---

[[redirects]]
  from = "/api/v1/signals/current"
  to = "/.netlify/functions/signal-current"
  status = 200

[[redirects]]
  from = "/api/v1/signals/history"
  to = "/.netlify/functions/signal-history"
  status = 200

[[redirects]]
  from = "/api/v1/signals/refresh"
  to = "/.netlify/functions/signal-refresh"
  status = 200

# --- Stripe ---

[[redirects]]
  from = "/api/stripe/checkout"
